<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>💡 Idea Scratchpad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #020817;
    color: #e2e8f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 24px 16px 80px;
    max-width: 560px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .header p { font-size: 12px; color: #475569; margin-top: 3px; }

  .drive-btn {
    background: #0f172a;
    color: #7dd3fc;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.2s;
  }

  /* Capture zone */
  .capture {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 16px;
    padding: 28px 20px 20px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    transition: border-color 0.25s;
  }
  .capture.listening { border-color: #ef4444; }

  /* Mic button */
  .mic-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mic-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: radial-gradient(circle, #6366f1 0%, #4338ca 100%);
    box-shadow: 0 0 0 0 rgba(99,102,241,0);
    transition: background 0.25s, box-shadow 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .mic-btn.active {
    background: radial-gradient(circle, #ef4444 0%, #b91c1c 100%);
    box-shadow: 0 0 0 10px rgba(239,68,68,0.2), 0 0 0 20px rgba(239,68,68,0.08);
  }
  .mic-btn svg { pointer-events: none; }

  /* Pulse rings */
  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.9); opacity: 0; }
  }
  .pulse-ring {
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    border: 2px solid rgba(239,68,68,0.4);
    display: none;
  }
  .pulse-ring.r1 { animation: pulse 1.5s ease-out 0s infinite; }
  .pulse-ring.r2 { animation: pulse 1.5s ease-out 0.75s infinite; }
  .listening .pulse-ring { display: block; }

  .mic-status {
    font-size: 13px;
    font-family: monospace;
    color: #475569;
    text-align: center;
    transition: color 0.2s;
  }
  .listening .mic-status { color: #fca5a5; }

  /* Transcript */
  textarea {
    width: 100%;
    background: #020817;
    border: 1px solid #1e293b;
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 15px;
    line-height: 1.6;
    padding: 12px 14px;
    resize: none;
    outline: none;
    font-family: inherit;
    min-height: 90px;
  }
  textarea.interim { color: #94a3b8; font-style: italic; }
  textarea::placeholder { color: #334155; }

  /* Category row */
  .cat-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    width: 100%;
    align-items: center;
  }
  .cat-btn {
    border-radius: 20px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 11px;
    font-family: monospace;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: 1px solid #1e293b;
    background: transparent;
    color: #475569;
    transition: all 0.15s;
  }
  .cat-btn.active-code   { background: rgba(129,140,248,0.15); color: #818cf8; border-color: #818cf8; }
  .cat-btn.active-product{ background: rgba(244,114,182,0.15); color: #f472b6; border-color: #f472b6; }
  .cat-btn.active-design { background: rgba(52,211,153,0.15);  color: #34d399; border-color: #34d399; }
  .cat-btn.active-other  { background: rgba(148,163,184,0.15); color: #94a3b8; border-color: #94a3b8; }

  .spacer { flex: 1; }

  .save-btn {
    background: #1e293b;
    color: #475569;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 700;
    cursor: default;
    transition: all 0.15s;
  }
  .save-btn.ready {
    background: #6366f1;
    color: #fff;
    cursor: pointer;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .filter-btn {
    border-radius: 20px;
    padding: 3px 11px;
    cursor: pointer;
    font-size: 11px;
    font-family: monospace;
    background: transparent;
    color: #475569;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .filter-btn.active { background: #1e293b; color: #e2e8f0; border-color: #334155; }

  /* Idea card */
  .card {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 0;
    cursor: pointer;
    border-left-width: 3px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .card-cat { font-size: 10px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }
  .card-date { font-size: 10px; color: #475569; font-family: monospace; }
  .card-text { font-size: 14px; line-height: 1.55; color: #e2e8f0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .card-text.expanded { display: block; }
  .del-btn { background: none; border: none; color: #475569; cursor: pointer; font-size: 18px; line-height: 1; flex-shrink: 0; padding: 0; }

  .plan-btn {
    background: transparent;
    color: #6366f1;
    border: 1px solid #312e81;
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 12px;
    font-family: monospace;
    width: 100%;
    margin-bottom: 12px;
  }

  .empty { text-align: center; color: #334155; padding: 48px 0; font-size: 14px; }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    padding: 16px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 540px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .modal-head { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .modal-title { color: #818cf8; font-weight: 700; font-size: 15px; }
  .modal-close { background: none; border: none; color: #475569; cursor: pointer; font-size: 22px; line-height: 1; }
  .modal-excerpt { color: #475569; font-size: 12px; font-family: monospace; margin-bottom: 16px; }
  .modal-plan { color: #e2e8f0; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .modal-loading { color: #475569; font-family: monospace; font-size: 13px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #052e16; color: #4ade80;
    border: 1px solid #166534;
    border-radius: 20px; padding: 8px 20px;
    font-size: 13px; font-family: monospace;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
    z-index: 300;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: #2d0a0a; color: #f87171; border-color: #7f1d1d; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>💡 Idea Scratchpad</h1>
    <p id="count">0 ideas</p>
  </div>
  <button class="drive-btn" id="driveBtn" onclick="saveToDrive()">☁ Drive</button>
</div>

<div class="capture" id="capture">
  <div class="mic-wrap" id="micWrap">
    <div class="pulse-ring r1"></div>
    <div class="pulse-ring r2"></div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <svg id="micIcon" width="28" height="28" viewBox="0 0 24 24" fill="white">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
        <line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="21" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <p class="mic-status" id="micStatus">Tap mic to speak your idea</p>
  <textarea id="draft" placeholder="Your idea appears here…" rows="3" oninput="onDraftInput()"></textarea>
  <div class="cat-row">
    <button class="cat-btn active-code" data-cat="code" onclick="setCategory('code')">code</button>
    <button class="cat-btn" data-cat="product" onclick="setCategory('product')">product</button>
    <button class="cat-btn" data-cat="design" onclick="setCategory('design')">design</button>
    <button class="cat-btn" data-cat="other" onclick="setCategory('other')">other</button>
    <div class="spacer"></div>
    <button class="save-btn" id="saveBtn" onclick="saveIdea()">Save</button>
  </div>
</div>

<div class="filter-bar" id="filterBar" style="display:none"></div>
<div id="ideasList"></div>
<div class="empty" id="emptyMsg">Tap the mic and speak your first idea ↑</div>

<!-- Plan modal -->
<div class="modal-bg" id="modalBg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title">⚡ Implementation Plan</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <p class="modal-excerpt" id="modalExcerpt"></p>
    <div id="modalBody" class="modal-loading">Generating…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CAT_COLORS = { code:'#818cf8', product:'#f472b6', design:'#34d399', other:'#94a3b8' };
let ideas = JSON.parse(localStorage.getItem('scratchpad-ideas') || '[]');
let category = 'code';
let filter = 'all';
let recognition = null;
let listening = false;
let currentDraft = '';

// --- Speech ---
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    const interim = Array.from(e.results).map(r => r[0].transcript).join('');
    const isFinal = e.results[e.results.length - 1].isFinal;
    const ta = document.getElementById('draft');
    if (isFinal) {
      currentDraft = (currentDraft ? currentDraft + ' ' + interim : interim).trim();
      ta.value = currentDraft;
      ta.classList.remove('interim');
    } else {
      ta.value = interim;
      ta.classList.add('interim');
    }
    updateSaveBtn();
  };

  recognition.onend = () => {
    setListening(false);
    const ta = document.getElementById('draft');
    ta.classList.remove('interim');
    if (ta.value && !currentDraft) currentDraft = ta.value;
    ta.value = currentDraft;
    updateSaveBtn();
  };

  recognition.onerror = (e) => {
    setListening(false);
    if (e.error === 'not-allowed') {
      document.getElementById('micStatus').textContent = 'Mic permission denied — allow in Chrome settings';
    }
  };
} else {
  document.getElementById('micStatus').textContent = 'Use Chrome for voice input';
  document.getElementById('micBtn').style.opacity = '0.4';
}

function toggleMic() {
  if (!recognition) return;
  if (listening) {
    recognition.stop();
  } else {
    currentDraft = document.getElementById('draft').value.trim();
    recognition.start();
    setListening(true);
  }
}

function setListening(val) {
  listening = val;
  const btn = document.getElementById('micBtn');
  const capture = document.getElementById('capture');
  const status = document.getElementById('micStatus');
  const icon = document.getElementById('micIcon');

  if (val) {
    btn.classList.add('active');
    capture.classList.add('listening');
    status.textContent = 'Listening… tap to stop';
    icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
  } else {
    btn.classList.remove('active');
    capture.classList.remove('listening');
    status.textContent = 'Tap mic to speak your idea';
    icon.innerHTML = '<rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/><line x1="12" y1="17" x2="12" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="21" x2="16" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>';
  }
}

// --- Draft input (manual typing) ---
function onDraftInput() {
  currentDraft = document.getElementById('draft').value;
  updateSaveBtn();
}

function updateSaveBtn() {
  const btn = document.getElementById('saveBtn');
  const hasText = document.getElementById('draft').value.trim().length > 0;
  btn.classList.toggle('ready', hasText);
}

// --- Category ---
function setCategory(cat) {
  category = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.className = 'cat-btn' + (b.dataset.cat === cat ? ` active-${cat}` : '');
  });
}

// --- Save idea ---
function saveIdea() {
  const text = document.getElementById('draft').value.trim();
  if (!text) return;
  ideas.unshift({ id: Date.now(), text, category, timestamp: new Date().toISOString() });
  persist();
  document.getElementById('draft').value = '';
  currentDraft = '';
  updateSaveBtn();
  render();
  showToast('Idea saved!');
}

// --- Delete ---
function deleteIdea(id) {
  ideas = ideas.filter(i => i.id !== id);
  persist();
  render();
}

// --- Render ---
function render() {
  const list = document.getElementById('ideasList');
  const empty = document.getElementById('emptyMsg');
  const filterBar = document.getElementById('filterBar');
  const count = document.getElementById('ideasList');

  document.getElementById('count').textContent = `${ideas.length} idea${ideas.length !== 1 ? 's' : ''}`;

  const filtered = filter === 'all' ? ideas : ideas.filter(i => i.category === filter);

  // Filter bar
  if (ideas.length > 0) {
    filterBar.style.display = 'flex';
    const cats = ['all', 'code', 'product', 'design', 'other'];
    filterBar.innerHTML = cats.map(c => {
      const n = c === 'all' ? ideas.length : ideas.filter(i => i.category === c).length;
      if (c !== 'all' && n === 0) return '';
      return `<button class="filter-btn ${filter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c === 'all' ? 'all' : c} (${n})</button>`;
    }).join('');
  } else {
    filterBar.style.display = 'none';
  }

  // Empty state
  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    empty.textContent = ideas.length === 0 ? 'Tap the mic and speak your first idea ↑' : 'No ideas in this category';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(idea => {
    const color = CAT_COLORS[idea.category] || '#94a3b8';
    const date = new Date(idea.timestamp).toLocaleDateString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    return `
      <div class="card" style="border-left-color:${color}" onclick="toggleExpand(${idea.id})">
        <div class="card-header">
          <div style="flex:1;min-width:0">
            <div class="card-meta">
              <span class="card-cat" style="color:${color}">${idea.category}</span>
              <span class="card-date">${date}</span>
            </div>
            <p class="card-text" id="text-${idea.id}">${escHtml(idea.text)}</p>
          </div>
          <button class="del-btn" onclick="event.stopPropagation();deleteIdea(${idea.id})">×</button>
        </div>
      </div>
      <button class="plan-btn" onclick="convertToPlan(${idea.id})">⚡ Convert to plan</button>
    `;
  }).join('');
}

function toggleExpand(id) {
  const el = document.getElementById(`text-${id}`);
  if (el) el.classList.toggle('expanded');
}

function setFilter(f) {
  filter = f;
  render();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// --- Convert to plan ---
async function convertToPlan(id) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;
  document.getElementById('modalExcerpt').textContent = `"${idea.text.slice(0, 90)}${idea.text.length > 90 ? '…' : ''}"`;
  document.getElementById('modalBody').className = 'modal-loading';
  document.getElementById('modalBody').textContent = 'Generating…';
  document.getElementById('modalBg').classList.add('open');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `Convert this rough idea into a concise implementation plan with 5-8 clear bullet steps. Category: ${idea.category}.\n\nIdea: ${idea.text}` }]
      })
    });
    const data = await res.json();
    const plan = data.content?.find(b => b.type === 'text')?.text || 'Could not generate plan.';
    document.getElementById('modalBody').className = 'modal-plan';
    document.getElementById('modalBody').textContent = plan;
  } catch {
    document.getElementById('modalBody').textContent = 'Error — check connection and try again.';
  }
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

// --- Drive save ---
async function saveToDrive() {
  if (!ideas.length) return;
  const btn = document.getElementById('driveBtn');
  btn.textContent = 'Saving…';
  btn.style.color = '#94a3b8';
  try {
    const content = ideas.map(i =>
      `[${i.category.toUpperCase()}] ${new Date(i.timestamp).toLocaleString()}\n${i.text}`
    ).join('\n\n---\n\n');

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 1000,
        messages: [{ role: 'user', content: `Save this to Google Drive as "idea-scratchpad.txt":\n\n${content}\n\nReply with just "Done".` }],
        mcp_servers: [{ type: 'url', url: 'https://drivemcp.googleapis.com/mcp/v1', name: 'google-drive' }]
      })
    });
    const data = await res.json();
    const ok = data.content?.length > 0;
    btn.textContent = ok ? '✓ Saved' : '✗ Failed';
    btn.style.color = ok ? '#4ade80' : '#f87171';
    showToast(ok ? 'Saved to Google Drive!' : 'Save failed', !ok);
  } catch {
    btn.textContent = '✗ Failed';
    btn.style.color = '#f87171';
    showToast('Save failed', true);
  }
  setTimeout(() => { btn.textContent = '☁ Drive'; btn.style.color = '#7dd3fc'; }, 3000);
}

// --- Toast ---
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 2500);
}

// --- Persist ---
function persist() {
  localStorage.setItem('scratchpad-ideas', JSON.stringify(ideas));
}

// Init
render();
</script>
</body>
</html>
